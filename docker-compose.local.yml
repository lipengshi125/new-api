# Local build override for testing source changes (per-second billing UI).
# Builds the image from local source instead of pulling calciumion/new-api:latest.
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d --build
#   open http://localhost:3000
#   docker compose -f docker-compose.local.yml down        # stop
#   docker compose -f docker-compose.local.yml down -v      # stop + wipe data

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api:local
    container_name: new-api-local
    restart: unless-stopped
    command: --log-dir /app/logs
    ports:
      - "3001:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://:123456@redis:6379
      - TZ=Asia/Shanghai
      - GLOBAL_API_RATE_LIMIT_ENABLE=false
      - GLOBAL_WEB_RATE_LIMIT_ENABLE=false
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-local
    depends_on:
      - redis
      - postgres
    networks:
      - new-api-local-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:8-alpine
    container_name: redis-local
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "123456"]
    networks:
      - new-api-local-network

  postgres:
    image: postgres:18-alpine
    container_name: postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - pg_data_local:/var/lib/postgresql
    networks:
      - new-api-local-network

volumes:
  pg_data_local:

networks:
  new-api-local-network:
    driver: bridge
